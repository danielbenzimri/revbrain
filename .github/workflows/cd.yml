# =============================================================================
# CD - Continuous Deployment
# =============================================================================
# Runs on: Push to main or staging (after CI completes)
# Purpose: Deploy backend (Supabase) + frontend (Vercel) + worker (Cloud Run)
#
# Flow:
#   staging branch → revbrain-stg (Supabase) + revbrain-stg (Vercel) + cpq-worker-stg (Cloud Run)
#   main branch    → revbrain-prd (Supabase) + revbrain (Vercel) + cpq-worker-prod (Cloud Run)
#
# Required GitHub Secrets:
#   SUPABASE_ACCESS_TOKEN     — Supabase CLI auth token
#   SUPABASE_PROJECT_ID_STG   — qutuivleheybnkbhpdbn
#   SUPABASE_PROJECT_ID_PROD  — kfalhnqyzoghalidubrs
#   SUPABASE_DB_PASSWORD      — Database password for migrations
#   VERCEL_TOKEN              — Vercel API token
#   VERCEL_ORG_ID             — Vercel team/org ID
#   VERCEL_PROJECT_ID_STG     — Vercel project ID for staging
#   VERCEL_PROJECT_ID_PROD    — Vercel project ID for production
#
# Required GitHub Secrets (GCP — for worker deployment):
#   GCP_WORKLOAD_IDENTITY_PROVIDER_STG  — WIF provider for staging
#   GCP_WORKLOAD_IDENTITY_PROVIDER_PROD — WIF provider for production
#   GCP_DEPLOY_SA_STG                   — Deploy SA email for staging
#   GCP_DEPLOY_SA_PROD                  — Deploy SA email for production
# =============================================================================

name: CD

on:
  push:
    branches: [main, staging]

concurrency:
  group: cd-${{ github.ref_name }}
  cancel-in-progress: false # Don't cancel in-progress deploys

jobs:
  # ---------------------------------------------------------------------------
  # Wait for CI to pass before deploying
  # ---------------------------------------------------------------------------
  wait-for-ci:
    name: Wait for CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Wait for CI workflow
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-regexp: '^(Lint & Typecheck|Test|Build)$'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10

  # ---------------------------------------------------------------------------
  # Deploy Backend (Supabase Edge Functions)
  # ---------------------------------------------------------------------------
  deploy-backend:
    name: Deploy Backend
    needs: wait-for-ci
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Determine environment
        run: |
          BRANCH="${{ github.ref_name }}"
          if [ "$BRANCH" == "main" ]; then
            echo "PROJECT_ID=${{ secrets.SUPABASE_PROJECT_ID_PROD }}" >> $GITHUB_ENV
            echo "ENV_NAME=production" >> $GITHUB_ENV
          else
            echo "PROJECT_ID=${{ secrets.SUPABASE_PROJECT_ID_STG }}" >> $GITHUB_ENV
            echo "ENV_NAME=staging" >> $GITHUB_ENV
          fi

      - name: Link Supabase project
        run: supabase link --project-ref $PROJECT_ID

      - name: Push database migrations
        run: echo "y" | supabase db push --include-all -p "${DB_PASSWORD}" || echo "⚠️ Migration push failed or no new migrations — continuing with deploy"
        env:
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Deploy Edge Functions
        run: supabase functions deploy api --no-verify-jwt

      - name: Verify deployment
        run: |
          HEALTH_URL="https://${PROJECT_ID}.supabase.co/functions/v1/api/v1/health"
          echo "Checking: $HEALTH_URL"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed (HTTP $STATUS)"
            exit 1
          fi
          echo "✓ Edge function healthy ($ENV_NAME)"

  # ---------------------------------------------------------------------------
  # Deploy Frontend (Vercel)
  # ---------------------------------------------------------------------------
  deploy-frontend:
    name: Deploy Frontend
    needs: deploy-backend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Determine Vercel project
        run: |
          BRANCH="${{ github.ref_name }}"
          if [ "$BRANCH" == "main" ]; then
            echo "VERCEL_PROJECT_ID=${{ secrets.VERCEL_PROJECT_ID_PROD }}" >> $GITHUB_ENV
            echo "VERCEL_ENV=production" >> $GITHUB_ENV
          else
            echo "VERCEL_PROJECT_ID=${{ secrets.VERCEL_PROJECT_ID_STG }}" >> $GITHUB_ENV
            echo "VERCEL_ENV=production" >> $GITHUB_ENV
          fi

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=$VERCEL_ENV --token=$VERCEL_TOKEN

      - name: Build
        run: vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN)
          echo "✓ Deployed to: $URL"

  # ---------------------------------------------------------------------------
  # Deploy Worker (GCP Cloud Run Job)
  # ---------------------------------------------------------------------------
  # Only builds & deploys when worker-related code changes.
  # Uses Workload Identity Federation (keyless auth from GitHub Actions).
  # ---------------------------------------------------------------------------
  deploy-worker:
    name: Deploy Worker
    needs: wait-for-ci
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write # Required for Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 2

      - name: Detect worker changes
        id: changes
        run: |
          # Check if worker-related files changed in the latest commit
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- \
            'apps/worker/' \
            'packages/contract/' \
            'packages/database/' \
            2>/dev/null || echo "apps/worker/")
          if [ -n "$CHANGED" ]; then
            echo "worker_changed=true" >> $GITHUB_OUTPUT
          else
            echo "worker_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Determine environment
        if: steps.changes.outputs.worker_changed == 'true'
        run: |
          BRANCH="${{ github.ref_name }}"
          if [ "$BRANCH" == "main" ]; then
            echo "GCP_PROJECT_ID=revbrain-prod" >> $GITHUB_ENV
            echo "GCP_WIF_PROVIDER=${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_PROD }}" >> $GITHUB_ENV
            echo "GCP_DEPLOY_SA=${{ secrets.GCP_DEPLOY_SA_PROD }}" >> $GITHUB_ENV
            echo "ENV_SUFFIX=prod" >> $GITHUB_ENV
          else
            echo "GCP_PROJECT_ID=revbrain-stg" >> $GITHUB_ENV
            echo "GCP_WIF_PROVIDER=${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_STG }}" >> $GITHUB_ENV
            echo "GCP_DEPLOY_SA=${{ secrets.GCP_DEPLOY_SA_STG }}" >> $GITHUB_ENV
            echo "ENV_SUFFIX=stg" >> $GITHUB_ENV
          fi
          echo "GCP_REGION=us-central1" >> $GITHUB_ENV

      - name: Authenticate to GCP
        if: steps.changes.outputs.worker_changed == 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_DEPLOY_SA }}

      - name: Set up Cloud SDK
        if: steps.changes.outputs.worker_changed == 'true'
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        if: steps.changes.outputs.worker_changed == 'true'
        run: gcloud auth configure-docker ${GCP_REGION}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        if: steps.changes.outputs.worker_changed == 'true'
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/revbrain/worker"
          SHORT_SHA="${GITHUB_SHA::8}"

          docker build \
            -f apps/worker/Dockerfile \
            -t "${IMAGE}:${SHORT_SHA}" \
            -t "${IMAGE}:latest" \
            .

          docker push "${IMAGE}:${SHORT_SHA}"
          docker push "${IMAGE}:latest"
          echo "✓ Pushed ${IMAGE}:${SHORT_SHA}"

      - name: Update Cloud Run Job
        if: steps.changes.outputs.worker_changed == 'true'
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/revbrain/worker"
          SHORT_SHA="${GITHUB_SHA::8}"

          gcloud run jobs update "cpq-worker-${ENV_SUFFIX}" \
            --image="${IMAGE}:${SHORT_SHA}" \
            --region=${GCP_REGION} \
            --project=${GCP_PROJECT_ID}
          echo "✓ Updated cpq-worker-${ENV_SUFFIX} to ${SHORT_SHA}"

      - name: Skip (no worker changes)
        if: steps.changes.outputs.worker_changed == 'false'
        run: echo "⏭ No worker changes detected — skipping deployment"
